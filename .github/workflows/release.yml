name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64

          - goos: linux
            goarch: arm64

          - goos: darwin
            goarch: amd64

          - goos: darwin
            goarch: arm64

          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist

          NAME=sm-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}

          if [ "${{ matrix.goos }}" = "windows" ]; then
            NAME=$NAME.exe
          fi

          go build \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/$NAME

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
