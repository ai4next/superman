workspace: ${HOME}/.sm

model:
  provider: openai
  name: gpt-4o
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}

server:
  addr: 127.0.0.1:8080

tools:
  code_run:
    enabled: true
    timeout: 30s
    allowed_languages: [python, bash, sh]
  read:
    enabled: true
    max_size: 10485760
  write:
    enabled: true
    max_size: 10485760
  patch:
    enabled: true
  web_scan:
    enabled: true
    timeout: 15s
  web_execute:
    enabled: false
    timeout: 15s
    headless: false
    user_data_dir: ${HOME}/.sm/chrome-profile
    browser_path: ""
    remote_debugging_url: ""
  ask_user:
    enabled: true

memory:
  l1:
    max_index_items: 50
    max_sections: 100
  l2:
    max_index_items: 50

plugins:
  - name: logger
    enabled: true
  - name: session_reaper
    enabled: true
    config:
      max_turns: 100
      max_age: 2h

session:
  max_turns: 75

reflect:
  autonomous:
    idle_timeout: 30m
  scheduler:
    tasks_dir: ./config/tasks

expert:
  enabled: true
  max_count: 10
