workspace: ${HOME}/.sm

model:
  provider: openai          # gemini | openai | deepseek | claude | ollama
  name: gpt-4o
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}

server:
  addr: 127.0.0.1:8080

tools:
  code_run:
    enabled: true
    timeout: 30s
    allowed_languages: [python, bash, sh]
  read:
    enabled: true
    max_size: 10485760       # 10MB
  write:
    enabled: true
    max_size: 10485760       # 10MB
  patch:
    enabled: true
  ask_user:
    enabled: true

# Memory index limits
memory:
  l1:
    max_index_items: 50
    max_sections: 100
  l2:
    max_index_items: 50

# Skill system — multiple paths supported
skills:
  enabled: true
  paths:
    - ${HOME}/.sm/skills
    - ./skills

# MCP server integration
mcp:
  servers:
    - name: my-server
      enabled: true
      command: npx
      args: [-y, @modelcontextprotocol/server-filesystem, /tmp]
      tools: []                 # empty = all tools; specify names to filter

# Session management
session:
  app_name: superman
  max_turns: 75
  archive_interval: 6h
  session_ttl: 48h
  loop_detection:
    enabled: true
    window_size: 10
    max_repeats: 5

# Autonomous reflection
reflect:
  autonomous:
    idle_timeout: 30m
  scheduler:
    tasks_dir: ./config/tasks

# Expert cultivation/delegation
expert:
  enabled: true
  max_count: 10

plugins:
  - name: session_reaper
    enabled: true
